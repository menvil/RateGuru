name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

# A new push to the same branch/PR cancels the still-running outdated run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-style:
    name: Code style (Pint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

  static-analysis:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: php -d memory_limit=1G vendor/bin/phpstan analyse --no-progress

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build
          retention-days: 1

  tests:
    name: Tests (Pest)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # The Browser test suite (Pest v4 browser tests) drives a real Chromium
      # through Playwright; without it `php artisan test` aborts at startup.
      - name: Install Playwright
        run: |
          npm ci --ignore-scripts
          npx playwright install chromium --with-deps

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite

      - name: Run tests
        run: php artisan test --parallel

      - name: Upload Laravel logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-logs
          path: storage/logs
          retention-days: 5

  migrations-mysql:
    name: Migrations (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: rateguru
          MYSQL_ROOT_PASSWORD: rateguru
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prateguru --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run migrations on MySQL
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: rateguru
          DB_USERNAME: root
          DB_PASSWORD: rateguru
        run: php artisan migrate:fresh --force

      - name: Check rollback path (non-blocking)
        continue-on-error: true
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: rateguru
          DB_USERNAME: root
          DB_PASSWORD: rateguru
        run: |
          php artisan migrate:reset --force
          php artisan migrate --force

  migrations-postgres:
    name: Migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rateguru
          POSTGRES_USER: rateguru
          POSTGRES_PASSWORD: rateguru
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U rateguru -d rateguru"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_pgsql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run migrations on PostgreSQL
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: rateguru
          DB_USERNAME: rateguru
          DB_PASSWORD: rateguru
        run: php artisan migrate:fresh --force

      - name: Check rollback path (non-blocking)
        continue-on-error: true
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: rateguru
          DB_USERNAME: rateguru
          DB_PASSWORD: rateguru
        run: |
          php artisan migrate:reset --force
          php artisan migrate --force

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Audit Composer dependencies
        # --locked: audits composer.lock directly, no vendor install needed
        run: composer audit --locked

      - name: Audit npm dependencies
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
