name: Deploy to staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - develop

  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: true
        default: develop
        type: string

      run-migrations:
        description: Run Laravel migrations before switching current
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: rateguru-staging-deployment
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve staging source
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'develop'
      )
    runs-on: ubuntu-latest

    outputs:
      checkout_ref: ${{ steps.source.outputs.checkout_ref }}
      source_ref: ${{ steps.source.outputs.source_ref }}
      run_migrations: ${{ steps.source.outputs.run_migrations }}

    steps:
      - name: Resolve exact source revision
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DISPATCH_REF: ${{ inputs.ref }}
          DISPATCH_RUN_MIGRATIONS: ${{ inputs.run-migrations }}
        run: |
          set -Eeuo pipefail

          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            test "${WORKFLOW_RUN_BRANCH}" = "develop"
            test -n "${WORKFLOW_RUN_SHA}"

            checkout_ref="${WORKFLOW_RUN_SHA}"
            source_ref="develop"
            run_migrations="true"
          else
            test -n "${DISPATCH_REF}"

            checkout_ref="${DISPATCH_REF}"
            source_ref="${DISPATCH_REF}"

            case "${DISPATCH_RUN_MIGRATIONS}" in
              true|false)
                run_migrations="${DISPATCH_RUN_MIGRATIONS}"
                ;;
              *)
                echo "Invalid run-migrations value" >&2
                exit 1
                ;;
            esac
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "source_ref=${source_ref}"
            echo "run_migrations=${run_migrations}"
          } >> "${GITHUB_OUTPUT}"

          echo "Source: ${source_ref}"
          echo "Checkout ref: ${checkout_ref}"
          echo "Run migrations: ${run_migrations}"

  build:
    name: Build immutable Laravel artifact
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      source-sha: ${{ steps.release.outputs.source_sha }}
      release-id: ${{ steps.release.outputs.release_id }}
      artifact-name: ${{ steps.release.outputs.artifact_name }}
      workflow-artifact-name: ${{ steps.release.outputs.workflow_artifact_name }}

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.5"
          extensions: bcmath, curl, gd, intl, mbstring, pcntl, pdo_pgsql, redis, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 26
          cache: npm

      - name: Install production PHP dependencies
        env:
          APP_ENV: production
        run: |
          composer install \
            --no-dev \
            --no-interaction \
            --prefer-dist \
            --no-progress \
            --classmap-authoritative

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Build release archive
        id: release
        shell: bash
        env:
          SOURCE_REF: ${{ needs.resolve.outputs.source_ref }}
        run: |
          set -Eeuo pipefail

          source_sha="$(git rev-parse HEAD)"
          short_sha="${source_sha:0:7}"
          timestamp="$(date -u +%Y%m%d-%H%M%S)"

          normalized_source_ref="${SOURCE_REF#refs/tags/}"
          release_version="v0.0.0"

          if [[ "${normalized_source_ref}" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+)(-[A-Za-z0-9][A-Za-z0-9._-]*)?$ ]]; then
            release_version="${BASH_REMATCH[1]}"
          fi

          release_id="${release_version}-${timestamp}-${short_sha}"
          artifact_name="rateguru-${release_id}.tar.gz"
          workflow_artifact_name="rateguru-release-${release_id}"

          package_root="${RUNNER_TEMP}/rateguru-package"
          output_root="${RUNNER_TEMP}/rateguru-output"

          rm -rf "${package_root}" "${output_root}"
          mkdir -p "${package_root}" "${output_root}"

          test -f artisan
          test -f public/index.php
          test -f vendor/autoload.php
          test -f public/build/manifest.json

          rsync \
            --archive \
            --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules/' \
            --exclude='storage/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='coderabbit-review/' \
            --exclude='tools/' \
            --exclude='database/database.sqlite' \
            --exclude='public/hot' \
            ./ \
            "${package_root}/"

          jq \
            --null-input \
            --arg project "rateguru" \
            --arg environment "staging" \
            --arg source_ref "${SOURCE_REF}" \
            --arg source_sha "${source_sha}" \
            --arg release "${release_id}" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg workflow_run_id "${GITHUB_RUN_ID}" \
            --arg workflow_run_number "${GITHUB_RUN_NUMBER}" \
            '{
              project: $project,
              environment: $environment,
              source_ref: $source_ref,
              source_sha: $source_sha,
              release: $release,
              built_at: $built_at,
              workflow_run_id: $workflow_run_id,
              workflow_run_number: $workflow_run_number
            }' \
            > "${package_root}/release.json"

          tar \
            -C "${package_root}" \
            -czf "${output_root}/${artifact_name}" \
            .

          (
            cd "${output_root}"

            sha256sum "${artifact_name}" \
              > "${artifact_name}.sha256"
          )

          {
            echo "source_sha=${source_sha}"
            echo "release_id=${release_id}"
            echo "artifact_name=${artifact_name}"
            echo "workflow_artifact_name=${workflow_artifact_name}"
          } >> "${GITHUB_OUTPUT}"

          echo "Built ${release_id}"
          du -h "${output_root}/${artifact_name}"

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.release.outputs.workflow_artifact_name }}
          path: |
            ${{ runner.temp }}/rateguru-output/${{ steps.release.outputs.artifact_name }}
            ${{ runner.temp }}/rateguru-output/${{ steps.release.outputs.artifact_name }}.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  deploy:
    name: Deploy Laravel application to staging
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    environment: staging
    timeout-minutes: 10

    steps:
      - name: Checkout deployment action
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Deployment code is always taken from the trusted develop branch,
          # not from the arbitrary application ref being deployed.
          ref: develop
          fetch-depth: 1
          persist-credentials: false

      - name: Download immutable release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.build.outputs.workflow-artifact-name }}
          path: ${{ runner.temp }}/rateguru-release

      - name: Deploy to staging
        uses: ./.github/actions/deploy-rateguru
        with:
          deploy-host: ${{ vars.DEPLOY_HOST }}
          deploy-port: ${{ vars.DEPLOY_PORT }}
          deploy-user: ${{ vars.DEPLOY_USER }}
          deploy-incoming: ${{ vars.DEPLOY_INCOMING }}
          deploy-wrapper: ${{ vars.DEPLOY_WRAPPER }}
          deploy-root: ${{ vars.DEPLOY_ROOT }}

          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

          release-id: ${{ needs.build.outputs.release-id }}

          artifact-path: ${{ runner.temp }}/rateguru-release/${{ needs.build.outputs.artifact-name }}
          checksum-path: ${{ runner.temp }}/rateguru-release/${{ needs.build.outputs.artifact-name }}.sha256

          run-migrations: ${{ needs.resolve.outputs.run_migrations }}
