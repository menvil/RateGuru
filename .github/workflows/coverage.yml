name: Test coverage

# Coverage mirrors the two deploy targets (develop = staging, main =
# production): it runs on release/hotfix PRs into main (visible before the
# merge), and on every push to either deploy branch. Regular feature PRs
# into develop skip it — use "Run workflow" manually when needed.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

# A newer run for the same ref cancels an outstanding one.
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage (Pest + PCOV)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, pcov
          coverage: pcov

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite
          npm run build

      # Coverage measures the Unit and Feature suites only. The Browser suite
      # is exercised (and gated) by the CI "Tests" job; adding it here hangs on
      # PCOV coverage collection from a real Chromium and contributes just
      # +0.16% (9 of 5625 statements), nearly all already hit by Feature tests.
      - name: Run tests with coverage
        # Explicit bash shell enables pipefail, so a test failure is not
        # masked by tee's exit code.
        shell: bash
        run: |
          php artisan test --testsuite=Unit,Feature --coverage --coverage-clover=coverage.xml | tee coverage-output.txt

      - name: Publish coverage summary
        if: always()
        run: |
          echo '## Test coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 25 coverage-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: coverage.xml
          retention-days: 30
