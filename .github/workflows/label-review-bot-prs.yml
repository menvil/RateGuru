name: Label review bot PRs

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, labeled, unlabeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  label-review-bot-pr:
    name: Label release/hotfix PRs
    runs-on: ubuntu-latest
    steps:
      - name: Sync review bot labels
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const isInternalPr = context.payload.pull_request.head.repo.full_name === context.repo.owner + '/' + context.repo.repo;
            const isReviewBranch = headRef.startsWith('release/') || headRef.startsWith('hotfix/');
            const allowed = isInternalPr && isReviewBranch;
            const managedLabels = ['release', 'hotfix'];
            const label = headRef.startsWith('hotfix/') ? 'hotfix' : 'release';
            const colors = {
              release: '0E8A16',
              hotfix: 'B60205',
            };

            if (!allowed) {
              const currentLabels = context.payload.pull_request.labels.map((item) => item.name);

              for (const managedLabel of managedLabels) {
                if (!currentLabels.includes(managedLabel)) {
                  continue;
                }

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: managedLabel,
                });
              }

              return;
            }

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: colors[label],
                });
              } catch (createError) {
                if (createError.status !== 422) {
                  throw createError;
                }
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
