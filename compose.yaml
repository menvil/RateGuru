name: rateguru

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rateguru
      POSTGRES_USER: rateguru
      POSTGRES_PASSWORD: rateguru
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/local/postgres/ensure-test-database.sh:/usr/local/bin/ensure-test-database:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rateguru -d rateguru"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
